<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatr Integration Test</title>
  <style>
    body {
      font-family: monospace;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #00ff00;
    }
    h1 { color: #00ff00; }
    button {
      background: #00ff00;
      color: #000;
      border: none;
      padding: 10px 20px;
      margin: 10px 5px;
      cursor: pointer;
      font-family: monospace;
    }
    button:hover { background: #00cc00; }
    pre {
      background: #000;
      padding: 15px;
      border: 1px solid #00ff00;
      overflow-x: auto;
    }
    .status { margin: 20px 0; }
    .error { color: #ff0000; }
    .success { color: #00ff00; }
  </style>
</head>
<body>
  <h1>Relatr Integration Test</h1>

  <div class="status">
    <p id="status">Click a button to test...</p>
  </div>

  <button onclick="testHealth()">Test Health</button>
  <button onclick="testStats()">Test Stats</button>
  <button onclick="testTrustScore()">Test Trust Score</button>
  <button onclick="testModule()">Test Relatr Module</button>

  <h2>Response:</h2>
  <pre id="output"></pre>

  <script type="module">
    import * as Relatr from './js/relatr.js';
    window.Relatr = Relatr;

    window.testHealth = async function() {
      setStatus('Testing health endpoint...');
      try {
        const response = await fetch('/api/health');
        const data = await response.json();
        showOutput(data);
        setStatus('✓ Health check successful', 'success');
      } catch (error) {
        showError(error);
      }
    };

    window.testStats = async function() {
      setStatus('Testing Relatr stats endpoint...');
      try {
        const response = await fetch('/api/relatr/stats');
        const data = await response.json();
        showOutput(data);
        setStatus('✓ Stats retrieved successfully', 'success');
      } catch (error) {
        showError(error);
      }
    };

    window.testTrustScore = async function() {
      setStatus('Testing trust score endpoint...');
      const testPubkey = '6e468422dfb74a5738702a8823b9b28168abab8655faacb6853cd0ee15deee93';
      try {
        const response = await fetch(`/api/relatr/trust-score/${testPubkey}`);
        const data = await response.json();
        showOutput(data);
        setStatus(`✓ Trust score: ${data.score}/100 (distance: ${data.distance})`, 'success');
      } catch (error) {
        showError(error);
      }
    };

    window.testModule = async function() {
      setStatus('Testing Relatr module integration...');
      const testPubkey = '6e468422dfb74a5738702a8823b9b28168abab8655faacb6853cd0ee15deee93';
      try {
        const result = await Relatr.getTrustScore(testPubkey);
        showOutput(result);
        const level = Relatr.getTrustLevel(result.score);
        const badge = Relatr.getTrustBadge(result.score);
        setStatus(`✓ Module test: Score ${result.score}, Level: ${level} ${badge}`, 'success');
      } catch (error) {
        showError(error);
      }
    };

    function setStatus(message, className = '') {
      const el = document.getElementById('status');
      el.textContent = message;
      el.className = className;
    }

    function showOutput(data) {
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
    }

    function showError(error) {
      setStatus(`✗ Error: ${error.message}`, 'error');
      showOutput({ error: error.message, stack: error.stack });
    }

    setStatus('Ready. Relatr module loaded.', 'success');
  </script>
</body>
</html>
